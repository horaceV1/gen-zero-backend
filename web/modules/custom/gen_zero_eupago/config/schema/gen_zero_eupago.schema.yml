gen_zero_eupago.settings:
  type: config_object
  label: 'EuPago integration settings'
  mapping:
    mode:
      type: string
      label: 'Mode (sandbox or live)'
    api_key:
      type: string
      label: 'API Key (chave)'
    channel:
      type: string
      label: 'Channel (canal)'
      nullable: true
    multibanco_deadline_days:
      type: integer
      label: 'Multibanco reference validity in days'
      nullable: true
    allowed_methods:
      type: sequence
      label: 'Allowed payment methods'
      sequence:
        type: string
        label: 'Method'
    notify_url:
      type: string
      label: 'Public notify (webhook) URL override'
      nullable: true
    return_url:
      type: string
      label: 'Return URL for credit-card redirect'
      nullable: true
    payment_gateway_id:
      type: string
      label: 'commerce_payment gateway machine name used to record payments'

core_version_requirement: ^10.3 || ^11
package: 'Gen Zero'
dependencies:
  - drupal:system
  - drupal:user
  - commerce:commerce
  - commerce:commerce_order
  - commerce:commerce_payment
  - commerce:commerce_price
configure: gen_zero_eupago.settings_form
